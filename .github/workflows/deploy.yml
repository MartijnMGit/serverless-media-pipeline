name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write # required to assume the AWS role via OIDC
  contents: read

env:
  AWS_REGION: eu-west-3

jobs:
  deploy:
    name: Terraform apply + frontend sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Pillow layer
        run: bash scripts/build_pillow_layer.sh

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform apply
        working-directory: terraform
        env:
          TF_VAR_notification_email: ${{ secrets.NOTIFICATION_EMAIL }}
        run: terraform apply -auto-approve -no-color

      - name: Sync frontend to S3
        working-directory: terraform
        run: |
          BUCKET=$(terraform output -raw frontend_bucket_name)
          aws s3 sync ../frontend "s3://$BUCKET" --delete

      - name: Invalidate CloudFront cache
        working-directory: terraform
        run: |
          DISTRIBUTION_ID=$(terraform output -raw cloudfront_distribution_id)
          aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION_ID" --paths "/*"
