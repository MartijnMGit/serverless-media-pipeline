<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serverless Media Pipeline</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Serverless Media Analysis Pipeline</h1>
    <p class="subtitle">
      Upload a photo &mdash; a Lambda + Step Functions pipeline generates a thumbnail,
      labels it with Rekognition, and stores the result, all on serverless AWS infrastructure.
    </p>
  </header>

  <main>
    <section class="upload-card">
      <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp">
      <button id="upload-button">Upload</button>
      <p id="upload-status"></p>
    </section>

    <section>
      <div class="gallery-header">
        <h2>Recent uploads</h2>
        <button id="refresh-button">Refresh</button>
      </div>
      <div id="gallery" class="gallery"></div>
    </section>
  </main>

  <footer>
    <p>
      <a href="https://github.com/MartijnMGit/serverless-media-pipeline" target="_blank">Source on GitHub</a>
    </p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
